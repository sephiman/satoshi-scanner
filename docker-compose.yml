services:
  scanner:
    container_name: satoshi-scanner
    build: .
    env_file:
      - path: .env
        required: false
    volumes:
      # Durable record of found wallets (FOUND_WALLETS_FILE).
      - scanner_data:/app/data
    labels:
      prometheus.scrape: "true"
      prometheus.port: "8000"
    networks:
      - all_dockers
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  scanner_data:

networks:
  all_dockers:
    external: true
