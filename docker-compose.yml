services:
  scanner:
    container_name: satoshi-scanner
    build: .
    env_file:
      - path: .env
        required: false
    volumes:
      # Durable record of found wallets (FOUND_WALLETS_FILE).
      - scanner_data:/app/data
    labels:
      prometheus.scrape: "true"
      prometheus.port: "8000"
    networks:
      - all_dockers
    restart: unless-stopped
    stop_grace_period: 30s
    # Hard ceiling (in cores) so the scanner can never hog the host, whatever
    # the BATCH_SIZE/SCAN_INTERVAL settings. Raise if the initial dump load
    # feels too slow — gzip decompression runs under the same cap.
    cpus: 0.5

volumes:
  scanner_data:

networks:
  all_dockers:
    external: true
